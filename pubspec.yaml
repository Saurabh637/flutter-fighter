publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flame: ^1.18.0
  flame_audio: ^2.10.2
  flame_forge2d: ^0.18.2

  flutter_riverpod: ^2.6.1
